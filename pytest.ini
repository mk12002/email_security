[pytest]
testpaths = tests/unit tests/integration
python_files = test_*.py
markers =
    smoke: fast smoke tests for trained-model sanity checks
    live: tests that perform live external API calls when credentials are configured
filterwarnings =
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14 or greater.:UserWarning
    ignore:Trying to unpickle estimator .*:sklearn.exceptions.InconsistentVersionWarning
